{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RecruitGuard-CHD{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/recruitguard.css' %}" rel="stylesheet">
    <style>
        :root {
            --rg-primary: #0a5c63;
            --rg-secondary: #d8efe8;
            --rg-accent: #f1a208;
            --rg-surface: #f8fbfc;
        }

        {% block theme_styles %}{% endblock %}

        body {
            {% block body_background %}
            background:
                radial-gradient(circle at top right, rgba(241, 162, 8, 0.10), transparent 28%),
                linear-gradient(135deg, #eef7f5, #f9fbfc 55%, #eef3f8);
            {% endblock %}
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block site_header %}{% endblock %}
    {% if messages %}
        <div class="rg-message-stack">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} mb-3">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    <main class="site-shell {% block main_class %}rg-container py-4{% endblock %}">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
